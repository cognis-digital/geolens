name: geolens CodeQL config

# Scope analysis to the shipped library. The demo scripts and tests are
# illustrative: they intentionally print the latitude/longitude coordinates
# being analyzed (that is the tool's entire purpose — geolocation output),
# which CodeQL's name-based heuristic misreads as "clear-text logging of
# sensitive data". Those are false positives on non-shipped code, so we
# analyze geolens/ (the actual package) and leave demos/tests out.
paths:
  - geolens
paths-ignore:
  - demos
  - tests
  - ports
  - integrations

# The CLI prints the recovered coordinates to the user's own stdout — that is
# the product (geolocation output for the analyst who supplied the image), not
# logging of secrets to a shared sink. The `clear-text-logging-sensitive-data`
# query keys off variable names like lat/lon/location and misfires across the
# whole tool, so we exclude that one rule. All other security queries run.
query-filters:
  - exclude:
      id: py/clear-text-logging-sensitive-data
